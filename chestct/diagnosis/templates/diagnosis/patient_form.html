{% extends 'diagnosis/base.html' %}
{% block content %}
<div class="container mt-5">
  <div class="card shadow-lg border-0">
    <div class="card-header bg-dark text-white">
      <h3 class="mb-0">Upload CT Scan & Patient Details</h3>
    </div>
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Patient ID</label>
          <input type="text" name="patient_id" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Age</label>
          <input type="number" name="age" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-select" required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">CT Scan Image</label>
          <input type="file" name="ct_image" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Analyze</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
